name: test

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.5.2
          run_install: false

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install

      - name: 运行构建（core/ui/web/extension）
        run: pnpm build && pnpm -F @prompt-optimizer/extension build

      - name: 运行测试（所有包）
        run: pnpm test -- --passWithNoTests

      - name: 验证 Web 项目可启动（构建产物存在）
        run: |
          test -d packages/web/dist || (echo "web dist missing" && exit 1)

      - name: 验证 MCP Server 构建
        run: pnpm mcp:build
